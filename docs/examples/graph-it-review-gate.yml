name: Graph-It Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  # Needed only when comment is true. Keep this permission for same-repository PR comments.
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: magic5644/Graph-It-Live/.github/actions/graph-it-review-gate@v1.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Empty uses npm's latest tag. Set cli-version: 1.12.0 to pin a release.
          comment: ${{ github.event.pull_request.head.repo.fork && 'false' || 'true' }}
          fail-on-risk: high