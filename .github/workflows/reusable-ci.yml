name: Reusable CI Validation

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        required: false
        default: '24.x'
        type: string
      run-e2e:
        description: Run VS Code E2E tests on Linux
        required: false
        default: false
        type: boolean
      package-extension:
        description: Build VSIX package after tests
        required: false
        default: true
        type: boolean

jobs:
  test:
    name: Test on ${{ matrix.os }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test

      - name: Run Tests (Windows/macOS)
        if: runner.os != 'Linux'
        run: npm run test

      - name: Install VS Code Extension Manager
        if: inputs.run-e2e
        run: npm install -g @vscode/vsce

      - name: Run E2E Tests (Linux)
        if: inputs.run-e2e && runner.os == 'Linux'
        run: xvfb-run -a npm run test:vscode:vsix

  package:
    name: Package Extension
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: test
    if: inputs.package-extension

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install VS Code Extension Manager
        run: npm install -g @vscode/vsce

      - name: Package Extension
        run: npm run package:vsix

      - name: Verify VSIX Content
        run: |
          echo "Checking VSIX content structure:"
          vsce ls --tree graph-it-live-*.vsix