name: Reusable NPM Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Semver version without v prefix (e.g. 1.9.7)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (branch, tag, or SHA)'
        required: true
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '24.x'

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Update Package Version
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Install Dependencies
        run: npm ci

      - name: Build CLI bundle
        run: npm run build:cli -- --production

      - name: Verify no .map files in CLI bundle
        run: |
          MAP_COUNT=$(find dist/ -name "*.map" | wc -l | tr -d ' ')
          if [ "$MAP_COUNT" -gt 0 ]; then
            echo "ERROR: .map files found in CLI bundle:"
            find dist/ -name "*.map"
            exit 1
          fi
          echo "OK: no .map files"

      - name: Check npm package exists
        run: |
          if npm view @magic5644/graph-it-live version 2>/dev/null; then
            echo "Package exists, continuing..."
          else
            echo "ERROR: Package does not exist on npm. Publish manually first."
            exit 1
          fi

      - name: Scope package name for npm publish
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = '@magic5644/graph-it-live';
          pkg.files = ['bin/', 'dist/graph-it.js', 'dist/astWorker.js', 'dist/mcpServer.mjs', 'dist/mcpWorker.js', 'dist/indexerWorker.js', 'dist/wasm/', 'dist/queries/', 'README.md', 'LICENSE', 'docs/CLI.md'];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'
          scope: '@magic5644'

      - name: Publish CLI to npm
        run: npm publish --access public --provenance --ignore-scripts
