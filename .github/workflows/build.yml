
name: CI

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - 'v*'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest*.config.mts'
      - 'esbuild.js'
      - 'eslint.config.mjs'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest*.config.mts'
      - 'esbuild.js'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      node-version: '24.x'
      run-e2e: true
      package-extension: true
