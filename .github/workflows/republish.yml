name: Republish Extension (Selective)

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to publish (e.g. 1.9.7 or v1.9.7)'
        required: true
        type: string
      ref:
        description: 'Branch or tag to checkout'
        required: true
        default: 'main'
        type: string
      skip_tests:
        description: 'Skip E2E tests before publishing'
        required: false
        default: false
        type: boolean
      publish_vscode:
        description: 'Publish to VS Code Marketplace'
        required: false
        default: false
        type: boolean
      publish_openvsx:
        description: 'Publish to Open VSX Registry'
        required: false
        default: false
        type: boolean
      publish_npm:
        description: 'Publish to npm registry'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ inputs.skip_tests == false }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      node-version: '24.x'
      run-e2e: true
      package-extension: true

  publish:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - name: Validate at least one store is selected
        run: |
          if [ "${{ inputs.publish_vscode }}" != "true" ] && \
             [ "${{ inputs.publish_openvsx }}" != "true" ] && \
             [ "${{ inputs.publish_npm }}" != "true" ]; then
            echo "ERROR: At least one publish target must be selected (publish_vscode, publish_openvsx, or publish_npm)."
            exit 1
          fi

      - name: Resolve release tag and version
        id: release_meta
        run: |
          RAW_INPUT="${{ inputs.version }}"
          if [[ "$RAW_INPUT" == v* ]]; then
            RELEASE_TAG="$RAW_INPUT"
          else
            RELEASE_TAG="v$RAW_INPUT"
          fi

          VERSION="${RELEASE_TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: Invalid version '$VERSION'. Expected semver like 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm version conflict
        if: ${{ inputs.publish_npm == true }}
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          if npm view @magic5644/graph-it-live@$VERSION version 2>/dev/null | grep -q "$VERSION"; then
            echo "ERROR: Version $VERSION already exists on npm. Cannot republish same version."
            exit 1
          fi
          echo "OK: version $VERSION not yet published on npm"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm

      - name: Update Package Version
        run: npm version ${{ steps.release_meta.outputs.version }} --no-git-tag-version

      - name: Install Dependencies
        run: npm ci

      - name: Install VS Code Extension Manager
        run: npm install -g @vscode/vsce

      - name: Package Extension
        run: npm run package:vsix

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "graph-it-live-${{ steps.release_meta.outputs.version }}.vsix"

      - name: Upload VSIX as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graph-it-live
          path: "*.vsix"
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.publish_vscode == true }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p $VSCE_PAT --packagePath graph-it-live-${{ steps.release_meta.outputs.version }}.vsix

      - name: Publish to Open VSX Registry
        if: ${{ inputs.publish_openvsx == true }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish -p $OVSX_PAT --packagePath graph-it-live-${{ steps.release_meta.outputs.version }}.vsix

      - name: Publish artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          files: "graph-it-live-*.vsix"
          tag_name: "${{ steps.release_meta.outputs.release_tag }}"
          name: "${{ steps.release_meta.outputs.release_tag }}"
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [validate, publish]
    if: |
      always() &&
      inputs.publish_npm == true &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped') &&
      needs.publish.result == 'success'
    uses: ./.github/workflows/reusable-npm-publish.yml
    with:
      version: ${{ needs.publish.outputs.version }}
      ref: ${{ inputs.ref }}
