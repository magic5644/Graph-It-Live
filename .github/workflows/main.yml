name: Build, Package, Test and Publish Extension

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npm test

  publish:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Get Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Package Version
        run: npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version

      - name: Install Dependencies
        run: npm ci

      - name: Install VS Code Extension Manager
        run: npm install -g @vscode/vsce

      - name: Package Extension
        run: npm run package:vsix

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "graph-it-live-${{ steps.get_version.outputs.VERSION }}.vsix"

      - name: Verify VSIX Content
        run: |
          echo "Checking VSIX content structure:"
          vsce ls --tree graph-it-live-*.vsix

      - name: Upload VSIX as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graph-it-live
          path: "*.vsix"
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p $VSCE_PAT --packagePath graph-it-live-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: Publish to Open VSX Marketplace
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish -p $OVSX_PAT --packagePath graph-it-live-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: Publish artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "graph-it-live-*.vsix"
          name: "v${{ steps.get_version.outputs.VERSION }}"
          body: "Release v${{ steps.get_version.outputs.VERSION }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@magic5644'

      - name: Build CLI bundle
        run: npm run build:cli -- --production

      - name: Verify no .map files in CLI bundle
        run: |
          MAP_COUNT=$(find dist/ -name "*.map" | wc -l | tr -d ' ')
          if [ "$MAP_COUNT" -gt 0 ]; then
            echo "ERROR: .map files found in CLI bundle:"
            find dist/ -name "*.map"
            exit 1
          fi
          echo "OK: no .map files"
      - name: Check if npm package exists
        run: |
          if npm view @magic5644/graph-it-live version 2>/dev/null; then
            echo "Package exists, continuing..."
          else
            echo "ERROR: Package does not exist on npm. Publish manually first."
            exit 1
          fi
      - name: Scope package name for npm publish
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = '@magic5644/graph-it-live';
          pkg.files = ['bin/', 'dist/graph-it.js', 'dist/astWorker.js', 'dist/mcpServer.mjs', 'dist/mcpWorker.js', 'dist/indexerWorker.js', 'dist/wasm/', 'dist/queries/', 'README.md', 'LICENSE'];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish CLI to npm
        run: npm publish --access public --provenance --ignore-scripts
