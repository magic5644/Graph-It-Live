name: Main Branch Validation

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest*.config.mts'
      - 'esbuild.js'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-ci.yml
    with:
      node-version: '24.x'
      run-e2e: false
      package-extension: true
